path = "agent.active_chat.fast_mode.model_deadline_seconds"
type = "float"
default = 120.0
min = 0.0
description = "Override model decision deadline for active chat and active reply; zero disables it."

[[fields]]
path = "agent.active_chat.fast_mode.source_context_before_messages"
type = "integer"
default = 50
min = 0
description = "Recent messages before the active-chat batch included as direct source context."

[[fields]]
path = "agent.active_chat.fast_mode.tools.extra"
type = "string_list"
default = []
description = "Additional tool names exposed to active chat fast mode; built-in chat action tools are always kept."

[[fields]]
path = "agent.active_chat.fast_mode.tools.tags"
type = "string_list"
default = []
description = "Additional tool registry tags exposed to active chat fast mode; built-in chat action tools are always kept."

[[fields]]
path = "agent.active_chat.fast_mode.prompts"
type = "object"
default = {}
description = "Prompt component ids for active chat fast mode."

[[fields]]
path = "agent.context.max_context_tokens"
type = "integer"
default = 32000
min = 1
description = "Reserved context token budget."
runtime_status = "reserved"

[[fields]]
path = "agent.context.evict_ratio"
type = "float"
default = 0.6
min = 0.0
max = 1.0
description = "Reserved context eviction ratio."
runtime_status = "reserved"

[[fields]]
path = "agent.context.use_image_thumbnails"
type = "boolean"
default = true
description = "Reserved context image thumbnail toggle."
runtime_status = "reserved"

[[fields]]
path = "agent.summaries.enabled"
type = "boolean"
default = true
description = "Reserved summary service toggle."
runtime_status = "reserved"

[[fields]]
path = "agent.summaries.active_chat_summary_max_age_seconds"
type = "float"
default = 1800.0
min = 0.0
description = "Maximum age of active chat summaries used by review."

[[fields]]
path = "agent.summaries.markdown.enabled"
type = "boolean"
default = true
description = "Whether agent summaries are mirrored as Markdown documents under the data directory."

[[fields]]
path = "agent.summaries.markdown.dir"
type = "path"
default = "summary"
description = "Data-directory-relative summary directory for Markdown documents."

[[fields]]
path = "agent.summaries.review_block_digest_max_age_seconds"
type = "float"
default = 86400.0
min = 0.0
description = "Reserved block digest max age."
runtime_status = "reserved"

[[fields]]
path = "agent.media.inspection_route_id"
type = "string"
default = "chat.vision"
description = "Reserved media inspection route id."
runtime_status = "reserved"

[[fields]]
path = "agent.media.sticker_summary_route_id"
type = "string"
default = "chat.vision"
description = "Reserved sticker summary route id."
runtime_status = "reserved"

[[fields]]
path = "agent.media.reanalysis_route_id"
type = "string"
default = "chat.vision"
description = "Reserved media reanalysis route id."
runtime_status = "reserved"

[[fields]]
path = "agent.media.prompts"
type = "object"
default = {}
