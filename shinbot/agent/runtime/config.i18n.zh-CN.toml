[provider]
display_name = "ShinBot Agent 运行配置"
description = "用于 data/agents/*.toml 的 Agent 运行配置结构。"

[fields."agent.id"]
label = "Agent ID"
description = "稳定的 Agent 标识，会用于实例配置引用。"

[fields."agent.mode"]
label = "运行模式"
description = "Agent 的运行模式；是否启用 Agent 入口仍由消息路由配置决定。"
choices = { simple = "简单模式", full = "完整模式" }

[fields."agent.persona_id"]
label = "人格 ID"
description = "此 Agent 使用的人格配置 ID。"

[fields."agent.prompt_files.locale"]
label = "主提示词语言"
description = "从文件加载 Agent 提示词时优先使用的语言。"

[fields."agent.prompt_files.fallback_locales"]
label = "备用提示词语言"
description = "主语言缺失时依次尝试的提示词语言列表。"

[fields."agent.prompt_files.sync_to_data"]
label = "同步内置提示词"
description = "加载前将内置提示词文件复制到 data 目录，便于本地覆盖和编辑。"

[fields."agent.prompt_files.data_root"]
label = "提示词数据目录"
description = "相对于 data 目录解析的提示词文件根目录。"

[fields."agent.defaults.llm"]
label = "默认模型引用"
description = "Agent 各阶段默认使用的模型引用；可用 [route] 或 [model] 前缀指定引用类型。"

[fields."agent.defaults.caller"]
label = "默认调用方标识"
description = "模型运行记录中使用的默认 caller 标识。"

[fields."agent.defaults.profile_id"]
label = "默认提示词 Profile"
description = "Agent 组装提示词时默认使用的 prompt profile ID。"

[fields."agent.defaults.max_model_retries"]
label = "默认模型重试次数"
description = "可重试模型失败的默认重试次数。"

[fields."agent.defaults.retry_backoff_seconds"]
label = "默认重试退避秒数"
description = "模型重试之间的默认等待时间。"

[fields."agent.defaults.params"]
label = "默认模型参数"
description = "合并到各 Agent 阶段的 provider 专属模型参数。"

[fields."agent.defaults.message_format.image_mode"]
label = "图片呈现方式"
description = "格式化消息时图片内容进入模型提示词的方式。"
choices = { original = "原始内容", thumbnail = "缩略图", description = "文字描述" }

[fields."agent.defaults.message_format.emoji_mode"]
label = "表情呈现方式"
description = "格式化消息时自定义表情进入模型提示词的方式。"
choices = { original = "原始内容", thumbnail = "缩略图", semantic = "语义描述" }

[fields."agent.defaults.message_format.pack_mode"]
label = "消息打包方式"
description = "多条消息写入模型提示词时的组织方式。"
choices = { individual = "逐条消息", pack = "合并打包" }

[fields."agent.defaults.message_format.timestamp_mode"]
label = "时间戳模式"
description = "格式化消息中时间戳的渲染策略。"

[fields."agent.defaults.message_format.inject_sender"]
label = "注入发送者"
description = "格式化消息时包含发送者标签。"

[fields."agent.defaults.message_format.inject_record_id"]
label = "注入消息记录 ID"
description = "格式化消息时包含消息日志记录 ID。"

[fields."agent.defaults.message_format.self_platform_id"]
label = "自身平台 ID"
description = "消息格式化时用于识别 bot 自身的平台 ID。"

[fields."agent.defaults.message_format.metadata"]
label = "消息格式化元数据"
description = "随消息格式化配置传递的附加元数据。"

[fields."agent.review.enabled"]
label = "启用审阅"
description = "预留的顶层审阅开关。"

[fields."agent.review.scan_batch_size"]
label = "扫描批量大小"
