[provider]
kind = "agent"
id = "shinbot.agent.runtime"
display_name = "ShinBot Agent Runtime"
description = "Runtime config schema for data/agents/*.toml Agent profiles."
config_version = "1.0.0"

[[fields]]
path = "agent.id"
type = "string"
required = true
description = "Stable Agent profile id."

[[fields]]
path = "agent.mode"
type = "enum"
default = "full"
choices = ["simple", "full"]
description = "Agent runtime profile mode. Main bot routing still owns whether Agent entry is enabled."

[[fields]]
path = "agent.persona_id"
type = "string"
default = ""
description = "Persona id selected by this Agent profile."
metadata = { component = "persona-ref" }

[[fields]]
path = "agent.prompt_files.locale"
type = "string"
default = "zh-CN"
description = "Primary locale for file-backed Agent prompts."

[[fields]]
path = "agent.prompt_files.fallback_locales"
type = "string_list"
default = ["en-US"]
description = "Fallback locales for file-backed Agent prompts."

[[fields]]
path = "agent.prompt_files.sync_to_data"
type = "boolean"
default = true
description = "Copy built-in prompt files to data_dir before loading them."

[[fields]]
path = "agent.prompt_files.data_root"
type = "path"
default = "prompts"
description = "Prompt data root resolved relative to data_dir."

[[fields]]
path = "agent.defaults.llm"
type = "string"
default = "[route]chat.default"
description = "Default LLM reference for Agent stages. Prefix with [route] or [model] to force target type."
component = "model-ref"

[[fields]]
path = "agent.defaults.caller"
type = "string"
default = ""
advanced = true
description = "Default caller label for model runtime calls."

[[fields]]
path = "agent.defaults.profile_id"
type = "string"
default = ""
advanced = true
description = "Default prompt profile id for Agent prompt assembly."

[[fields]]
path = "agent.defaults.max_model_retries"
type = "integer"
default = 1
min = 0
description = "Default retry count for retryable review model failures."

[[fields]]
path = "agent.defaults.retry_backoff_seconds"
type = "float"
default = 0.25
min = 0.0
description = "Default model retry backoff in seconds."

[[fields]]
path = "agent.defaults.model_deadline_seconds"
type = "float"
default = 120.0
min = 0.0
description = "Hard deadline for one logical Agent model decision across route fallback; zero disables it."

[[fields]]
path = "agent.defaults.params"
type = "object"
default = {}
advanced = true
description = "Default provider-specific model parameters merged into Agent stages."

[[fields]]
path = "agent.defaults.message_format.image_mode"
type = "enum"
default = "description"
choices = ["original", "thumbnail", "description"]
description = "How images are represented in formatted messages."

[[fields]]
path = "agent.defaults.message_format.emoji_mode"
type = "enum"
default = "semantic"
choices = ["original", "thumbnail", "semantic"]
description = "How custom emoji images are represented in formatted messages."

[[fields]]
path = "agent.defaults.message_format.pack_mode"
type = "enum"
default = "pack"
choices = ["individual", "pack"]
description = "How multiple messages are packed for model prompts."

[[fields]]
path = "agent.defaults.message_format.timestamp_mode"
type = "string"
default = "sparse"
description = "Timestamp rendering mode for formatted messages."

[[fields]]
path = "agent.defaults.message_format.inject_sender"
type = "boolean"
default = true
description = "Include sender labels in formatted messages."

[[fields]]
path = "agent.defaults.message_format.inject_record_id"
type = "boolean"
default = false
description = "Include message log ids in formatted messages."

[[fields]]
path = "agent.defaults.message_format.self_platform_id"
type = "string"
default = ""
advanced = true
description = "Default self platform id used by message formatting."

[[fields]]
path = "agent.defaults.message_format.metadata"
type = "object"
default = {}
advanced = true
description = "Arbitrary metadata carried with message format config."

[[fields]]
path = "agent.defaults.message_format.use_thumbnail"
type = "boolean"
default = true
deprecated = true
description = "Legacy template alias for image_mode = thumbnail."

[[fields]]
path = "agent.defaults.message_format.include_sender"
type = "boolean"
default = true
deprecated = true
description = "Legacy template alias for inject_sender."

[[fields]]
path = "agent.defaults.message_format.include_time"
type = "boolean"
default = true
deprecated = true
description = "Legacy template alias for timestamp_mode."

[[fields]]
path = "agent.defaults.message_format.include_message_id"
type = "boolean"
default = true
deprecated = true
description = "Legacy template alias for inject_record_id."

[[fields]]
path = "agent.review.enabled"
type = "boolean"
default = true
description = "Reserved top-level review toggle."
runtime_status = "reserved"

[[fields]]
path = "agent.review.scan_batch_size"
type = "integer"
default = 500
min = 1
description = "Maximum unread messages processed by one review scan batch."

[[fields]]
path = "agent.review.overflow_threshold_messages"
type = "integer"
default = 3000
min = 1
description = "Unread threshold before overflow compression is considered."

[[fields]]
path = "agent.review.overflow_compression_batch_size"
type = "integer"
default = 500
min = 1
description = "Unread batch size for overflow compression."

[[fields]]
path = "agent.review.reply_context_before_messages"
type = "integer"
default = 30
min = 0
description = "Messages included before a reply candidate."

[[fields]]
path = "agent.review.reply_context_after_messages"
type = "integer"
default = 10
min = 0
description = "Messages included after a reply candidate."

[[fields]]
path = "agent.review.tail_history_before_seconds"
type = "float"
default = 180.0
min = 0.0
description = "Seconds of recent tail history considered by review."

[[fields]]
path = "agent.review.tail_history_limit"
type = "integer"
default = 500
min = 1
description = "Maximum recent tail messages considered by review."

[[fields]]
path = "agent.review.active_chat_summary_max_age_seconds"
type = "float"
default = 1800.0
min = 0.0
description = "Maximum age of active chat summaries used by review."

[[fields]]
path = "agent.review.block_digest_concurrency"
type = "integer"
default = 4
min = 1
description = "Concurrent block digest runner count."

[[fields]]
path = "agent.review.reply_commit_timeout_seconds"
type = "float"
default = 20.0
min = 0.0
description = "Maximum wait for a cancelled review reply stage to settle before detaching it."

[[fields]]
path = "agent.review.bootstrap_timeout_seconds"
type = "float"
default = 20.0
min = 0.0
description = "Timeout for active chat bootstrap review."

[[fields]]
path = "agent.review.deferred_consumption_retry_after_seconds"
type = "float"
default = 30.0
min = 1.0
description = "Delay before retrying a review whose model or tool decision could not safely consume unread input."

[[fields]]
path = "agent.review.mention_wake_count"
type = "integer"
default = 1
min = 1
description = "Mention count needed to wake active reply."

[[fields]]
path = "agent.review.mention_wake_window_seconds"
type = "float"
default = 60.0
min = 0.0
description = "Mention wake rolling window in seconds."

[[fields]]
path = "agent.review.default_review_after_seconds"
type = "float"
default = 900.0
min = 0.0
description = "Initial and fallback review delay after a normal message or completed review."

[[fields]]
path = "agent.review.default_review_reason"
type = "string"
default = "default_idle_review_interval"
description = "Reason stored on static review plans before LLM idle planning overrides them."

[[fields]]
path = "agent.review.review_due_tick_interval_seconds"
type = "float"
default = 5.0
min = 0.0
description = "Background polling interval for due review plans."

[[fields]]
path = "agent.review.nearby_candidate_merge_gap"
type = "integer"
default = 10
min = 0
description = "Reserved review candidate merge gap."
runtime_status = "reserved"

[[fields]]
path = "agent.review.block_digest_retry_on_429"
