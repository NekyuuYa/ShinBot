# ShinBot Configuration Schema
#
# This file defines the schema for data/config.toml.
# It documents types, defaults, and constraints for each configuration section.
# This is a reference file — the actual config is data/config.toml.

# ─── [logging] ──────────────────────────────────────────────────────────────

[logging]

# Log level for the application.
# Values: "DEBUG" | "INFO" | "WARNING" | "ERROR"
# Default: "INFO"
level = "INFO"

# Controls visibility of third-party library logs (uvicorn, websockets, etc.).
# "off"   — suppress all third-party logs
# "debug" — show third-party logs only when level = "DEBUG"
# "on"    — always show third-party logs
# Default: "debug"
third_party_noise = "debug"


# ─── [database] ─────────────────────────────────────────────────────────────

[database]

# SQLAlchemy database URL.
# Supported: "sqlite:///data/db/shinbot.sqlite3"
# Default: "sqlite:///data/db/shinbot.sqlite3"
url = "sqlite:///data/db/shinbot.sqlite3"

# How long (in seconds) to keep prompt snapshots before cleanup.
# Set to 0 to disable cleanup.
# Default: 10800 (3 hours)
snapshot_ttl = 10800


# ─── [admin] ────────────────────────────────────────────────────────────────

[admin]

# Admin username for the management dashboard.
# Default: "admin"
username = "admin"

# Admin password for the management dashboard.
# IMPORTANT: Change before deploying to production.
# Default: "admin" (auto-replaced on first boot with a random password)
password = "admin"

# JWT token lifetime in hours.
# Default: 24
jwt_expire_hours = 24

# JWT signing secret. Leave empty to auto-generate data/admin_secret.key.
# Default: "" (auto-generate)
# jwt_secret = ""

# Path to the built dashboard dist folder.
# Default: "dashboard/dist"
# dashboard_dist = "dashboard/dist"

# Allowed CORS origins for the management API.
# Default: ["*"]
# cors_origins = ["http://localhost:5173"]

# Whether to allow CORS credentials (cookies).
# Note: Browsers reject wildcard ACAO when credentials are allowed.
# Default: false
# cors_allow_credentials = true

# Name of the session cookie.
# Default: "shinbot_session"
# auth_cookie_name = "shinbot_session"

# SameSite attribute for the session cookie.
# Values: "strict" | "lax" | "none"
# Default: "strict"
# auth_cookie_samesite = "strict"

# Secure attribute for the session cookie.
# null = auto-detect from request scheme (https/wss → true)
# Default: null (auto-detect)
# auth_cookie_secure = true

# Working directory for the framework update command.
# Default: "."
# framework_update_dir = "."

# Shell command to execute for framework updates.
# Default: "./deploy/update-framework.sh"
# framework_update_command = "./deploy/update-framework.sh"

# Timeout in seconds for the framework update command.
# Default: 300
# framework_update_timeout_seconds = 300

# Whether to restart the process after a successful framework update.
# Default: true
# framework_update_restart = true

# Working directory for the dashboard build command.
# Default: "dashboard"
# dashboard_build_dir = "dashboard"

# Shell command to build the dashboard.
# Default: "pnpm build"
# dashboard_build_command = "pnpm build"

# Timeout in seconds for the dashboard build command.
# Default: 180
# dashboard_build_timeout_seconds = 180


# ─── [permissions] ──────────────────────────────────────────────────────────

[permissions]

# Permission bindings map user/session keys to permission groups.
# Built-in groups: "default", "admin", "owner"
#
# Binding key formats:
#   Global:    "{bot_id}:{platform_user_id}"
#   Session:   "{bot_id}:{session_id}.{platform_user_id}"
#
# [[permissions.bindings]]
# key = "full-agent:123456789"
# group = "owner"
#
# [[permissions.bindings]]
# key = "full-agent:group:20001.123456789"
# group = "admin"
