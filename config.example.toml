# ShinBot Configuration
# Copy this file to config.toml and adjust the values.

[logging]
level = "INFO"  # DEBUG | INFO | WARNING | ERROR

[database]
url = "sqlite:///data/db/shinbot.sqlite3"


# ─── Bot Instances ────────────────────────────────────────────────────────────
# Each [[instances]] block represents a single bot account / connection.
# ShinBot supports multiple concurrent instances.

[[instances]]
id = "satori-main"   # Unique identifier
platform = "satori"  # Adapter type

[instances.config]
host = "localhost:5140"
token = ""
path = "/v1/events"
reconnect_delay = 5.0
max_reconnects = -1
download_resources = true
resource_cache_dir = "data/temp/resources"
silent_reconnect = true
reconnect_log_interval = 30.0

[[instances]]
id = "ob11-main"
platform = "onebot_v11"

[instances.config]
mode = "forward"                    # forward | reverse
url = "ws://127.0.0.1:3001"         # forward mode only
reverse_host = "0.0.0.0"            # reverse mode only (adapter listener bind host)
reverse_port = 8082                  # reverse mode only (adapter standalone listener port)
reverse_path = "/onebot/v11"        # reverse mode only
self_id = ""                        # optional reverse validation
access_token = ""
reconnect_delay = 5.0
max_reconnects = -1
request_timeout = 20.0
forward_max_depth = 3
download_resources = true
resource_cache_dir = "data/temp/resources"
silent_reconnect = true
reconnect_log_interval = 30.0


# ─── Plugins ─────────────────────────────────────────────────────────────────
# List Python modules to load as plugins on startup.
# Each module must expose a setup(ctx: PluginContext) function.

# [[plugins]]
# id     = "hello"
# module = "plugins.hello"

# Debug plugin can be enabled to inspect raw ingress events.
# [[plugins]]
# id     = "shinbot_debug_message"
# module = "shinbot.builtin_plugins.shinbot_debug_message"


# ─── Management API ───────────────────────────────────────────────────────────
# The management control plane is served at http://host:3945/api/v1
# All /api/v1/* routes require JWT authentication (except /auth/login).

[admin]
username = "admin"
password = "admin"                # Change before deploying
jwt_expire_hours = 24

# jwt_secret = ""                 # Leave empty to auto-generate and persist to data/admin_secret.key
# cors_origins = ["http://localhost:5173"]  # Vite dev server; defaults to ["*"]

# Bind users or sessions to permission groups.
# Groups: "default" (basic cmds), "admin" (tools.*), "owner" (all)

[permissions]
# Global binding: {instance_id}:{user_id} → group
# [[permissions.bindings]]
# key   = "main-bot:123456789"
# group = "owner"

# Session-local binding: {session_id}.{user_id} → group
# [[permissions.bindings]]
# key   = "main-bot:group:696879614.123456789"
# group = "admin"
