name: Python CI

on:
  workflow_dispatch:
    inputs:
      e2e_scenario:
        description: "Optional platform-sim scenario name/glob, for example agent_review_*"
        required: false
        type: string
      e2e_tag:
        description: "Optional comma-separated platform-sim tags. All tags must match."
        required: false
        type: string
  pull_request:
    branches:
      - main
      - master
    paths:
      - "shinbot/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "scripts/test_audit.py"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "shinbot/**"
      - "tests/**"
      - "main.py"
      - "pyproject.toml"
      - "scripts/test_audit.py"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python-ci.yml"

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Ruff and Test Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run --group dev ruff check .

      - name: Audit test suite governance
        run: uv run --group dev python scripts/test_audit.py

  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run dependency audit
        run: uv run pip-audit --require-hashes --disable-pip --requirement uv.lock || uv run pip-audit

  typecheck:
    name: Mypy Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run mypy
        run: uv run --group dev mypy

  test-fast:
    name: Pytest Fast Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest fast gate
        run: uv run --group dev python -m pytest -m "not integration and not slow and not e2e"

  test-integration-smoke:
    name: Pytest Integration Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run integration smoke suite
        run: >-
          uv run --group dev python -m pytest -m "integration and not slow"
          tests/integration/boot/test_boot_runtime.py
          tests/integration/routing/test_ingress.py
          tests/integration/core/test_app.py
          tests/integration/plugins/test_plugin.py
          tests/integration/agent/runtime/test_agent_runtime_dispatch.py
          tests/integration/agent/services/test_model_runtime_service.py
          tests/integration/agent/workflows/test_agent_active_chat_runner_context.py

  test-e2e-platform-sim:
    name: Pytest E2E Platform Simulation
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run platform simulation E2E
        env:
          E2E_SCENARIO: ${{ inputs.e2e_scenario }}
          E2E_TAG: ${{ inputs.e2e_tag }}
        run: |
          args=()
          if [ -n "$E2E_SCENARIO" ]; then
            args+=(--e2e-scenario "$E2E_SCENARIO")
          fi
          if [ -n "$E2E_TAG" ]; then
            args+=(--e2e-tag "$E2E_TAG")
          fi
          uv run --group dev python -m pytest -m e2e tests/e2e/platform_sim "${args[@]}"
