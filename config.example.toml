# ShinBot main configuration template
#
# Copy this file to:
#   data/config.toml
#
# This main config describes application-level wiring:
# - core services
# - adapter connections
# - globally installed plugins
# - bot service units
#
# Agent internals live in separate files under data/agents/*.toml.  The main
# config only references those files from each bot.


# ─── Core ────────────────────────────────────────────────────────────────────

[logging]
level = "INFO" # DEBUG | INFO | WARNING | ERROR

[database]
url = "sqlite:///data/db/shinbot.sqlite3"
snapshot_ttl = 10800


# ─── Admin / WebUI ───────────────────────────────────────────────────────────

[admin]
username = "admin"
password = "admin" # Change before deploying.
jwt_expire_hours = 24

# jwt_secret = "" # Empty means auto-generate data/admin_secret.key.
# dashboard_dist = "dashboard/dist"
# cors_origins = ["http://localhost:5173"]
# cors_allow_credentials = true
# auth_cookie_name = "shinbot_session"
# auth_cookie_samesite = "strict"
# auth_cookie_secure = true
# update_repo = "."
# update_allowed_branches = ["main", "master"]
# dashboard_dist_update_zip = "https://shinbot.nekyu.top/dist/webui-dist.zip"
# dashboard_dist_update_zip_sha256 = ""
# dashboard_dist_update_zip_sha256_url = "https://shinbot.nekyu.top/dist/webui-dist.zip.sha256"
# dashboard_dist_update_package_max_bytes = 104857600


# ─── Adapter Instances ───────────────────────────────────────────────────────
#
# Adapter instances are platform connections only.  They do not define persona,
# plugin policy, or agent behavior.  Bots bind to these instances below.
#
# Each adapter provider should expose its own config schema/template for WebUI
# and documentation.  Keep this file to small examples instead of duplicating
# every adapter-specific option here.

[[adapter_instances]]
id = "qq-main"
adapter = "onebot_v11"
enabled = true

[adapter_instances.config]
mode = "reverse"
reverse_port = 8082
reverse_path = "/onebot/v11"
access_token = ""


[[adapter_instances]]
id = "satori-main"
adapter = "satori"
enabled = false

[adapter_instances.config]
host = "localhost:5140"
token = ""
path = "/v1/events"


# ─── Plugins ────────────────────────────────────────────────────────────────
#
# This section declares globally available plugins.  A bot can enable a subset
# with bots.plugins.enabled_plugins.  Use ["*"] to enable every globally enabled
# plugin for that bot.
#
# Plugin-specific config schema/template should be provided by each plugin
# package.  Keep this file to plugin installation state and only tiny examples.

[[plugins]]
id = "shinbot_plugin_search"
module = "shinbot.builtin_plugins.shinbot_plugin_search"
enabled = false

[[plugins]]
id = "debug-message"
module = "shinbot.builtin_plugins.shinbot_debug_message"
enabled = false


[[plugins]]
id = "debug-model"
module = "shinbot.builtin_plugins.shinbot_debug_model"
enabled = false


# ─── Bots ───────────────────────────────────────────────────────────────────
#
# A bot is the service unit users interact with.  A bot may bind to one or more
# adapter instances or sessions.
#
# agent.mode:
# - "none": command/plugin bot only.
# - "simple": reserved for lightweight agent behavior.
# - "full": full scheduler + review + active_chat agent.

[[bots]]
id = "command-bot"
display_name = "Command Bot"
enabled = true

[bots.commands]
enabled = true
prefixes = ["/", "!"]

[bots.plugins]
enabled = true
enabled_plugins = ["debug-message"]

[bots.agent]
mode = "none"

[[bots.bindings]]
id = "command-bot-admin-group"
adapter_instance_id = "qq-main"
session_patterns = ["group:10001"]
enabled = true
priority = 100


[[bots]]
id = "full-agent"
display_name = "Full Agent Bot"
enabled = true

[bots.commands]
enabled = true
prefixes = ["/"]

[bots.plugins]
enabled = true
enabled_plugins = ["*"]
disabled_plugins = ["debug-message"]

[bots.agent]
mode = "full"
config = "agents/full-agent.toml" # Resolved relative to data/.

[[bots.bindings]]
id = "full-agent-main-group"
adapter_instance_id = "qq-main"
session_patterns = ["group:20001", "group:20002"]
enabled = true
priority = 10

[[bots.bindings]]
id = "full-agent-private"
adapter_instance_id = "qq-main"
session_patterns = ["private:*"]
enabled = true
priority = 20


# ─── Permissions ────────────────────────────────────────────────────────────

[permissions]

# Global binding: {bot_id}:{platform_user_id} -> group
# Groups: "default", "admin", "owner"
# [[permissions.bindings]]
# key = "full-agent:123456789"
# group = "owner"

# Session-local binding: {bot_id}:{session_id}.{platform_user_id} -> group
# [[permissions.bindings]]
# key = "full-agent:group:20001.123456789"
# group = "admin"
